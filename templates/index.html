<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LandLord Special Alpha</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="header-top">
      <div class="header-logo">🏠 LandLord<span>Special Alpha</span></div>
      <div class="header-month" id="hdr-day">🌸 Spring · Day 1</div>
    </div>
    <div class="header-bottom">
      <div class="header-stat">
        <span class="label">Cash</span>
        <span class="value" id="hdr-cash">$0</span>
      </div>
      <div class="header-stat" style="align-items:flex-end">
        <span class="label">Energy</span>
        <span class="value" id="hdr-energy">⚡ 10 / 10</span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main>

    <!-- Dashboard -->
    <div id="page-dashboard" class="page active">

      <button class="next-month-btn" onclick="advanceDays(1)">
        ⏭ Advance Time
      </button>

      <div class="section-header">
        <span class="section-title">Season</span>
      </div>
      <div class="card" id="dash-season"></div>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-icon">💵</div>
          <div class="stat-label">Cash on Hand</div>
          <div class="stat-value green" id="dash-cash">$0</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📈</div>
          <div class="stat-label">Net Worth</div>
          <div class="stat-value" id="dash-networth">$0</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🏠</div>
          <div class="stat-label">Properties</div>
          <div class="stat-value" id="dash-props">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">💰</div>
          <div class="stat-label">Weekly Income</div>
          <div class="stat-value orange" id="dash-income">$0/wk</div>
        </div>
      </div>

      <div class="section-header" style="margin-top:16px">
        <span class="section-title">💼 Side Jobs</span>
        <span style="font-size:12px;color:var(--text-muted)" id="dash-jobs-energy"></span>
      </div>
      <div id="dash-jobs"></div>

    </div>

    <!-- Market -->
    <div id="page-market" class="page">
      <div class="section-header">
        <span class="section-title">Properties for Sale</span>
      </div>
      <div id="market-list"></div>
    </div>

    <!-- Properties -->
    <div id="page-properties" class="page">
      <div class="section-header">
        <span class="section-title">My Portfolio</span>
      </div>
      <div id="property-list"></div>
    </div>

    <!-- Bank -->
    <div id="page-bank" class="page">
      <div id="bank-savings-section"></div>
      <div id="bank-loans-section"></div>
      <div id="bank-products-section"></div>
    </div>

    <!-- Settings -->
    <div id="page-settings" class="page"></div>

    <!-- Log -->
    <div id="page-log" class="page">
      <div class="section-header">
        <span class="section-title">Activity Log</span>
      </div>
      <div class="card">
        <div id="log-list"></div>
      </div>
    </div>

  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="dashboard">
      <span class="nav-icon">📊</span>
      Home
    </button>
    <button class="nav-btn" data-page="market">
      <span class="nav-icon">🏪</span>
      Market
    </button>
    <button class="nav-btn" data-page="properties">
      <span class="nav-icon">🏠</span>
      My Props
    </button>
    <button class="nav-btn" data-page="bank">
      <span class="nav-icon">🏦</span>
      Bank
    </button>
    <button class="nav-btn" data-page="log">
      <span class="nav-icon">📋</span>
      Log
    </button>
    <button class="nav-btn" data-page="settings">
      <span class="nav-icon">⚙️</span>
      Settings
    </button>
  </nav>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Toasts -->
  <div id="toast-container"></div>

</div>
<script src="/static/game.js"></script>
</body>
</html>
