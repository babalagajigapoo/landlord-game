<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Slumlord Special</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Dirt&family=Great+Vibes&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="header-top">
      <div class="header-logo"><img src="/static/icons/house-bungalow.svg" width="28" height="28" style="image-rendering:pixelated;vertical-align:middle"> <span style="font-family:'Rubik Dirt',cursive;color:inherit">SlumLord</span><span style="font-family:'Great Vibes',cursive;font-size:22px"> Special</span></div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="header-month" id="hdr-day">🌸 Spring · Day 1</div>
        <button class="header-gear-btn" onclick="navTo('settings')" title="Settings">⚙️</button>
      </div>
    </div>
    <div class="header-bottom">
      <div class="header-stat">
        <span class="label">Cash</span>
        <span class="value" id="hdr-cash">$0</span>
      </div>
      <div class="header-stat" style="align-items:flex-end">
        <span class="label">Energy</span>
        <span class="value" id="hdr-energy">⚡ 10 / 10</span>
      </div>
    </div>
    <div class="header-xp">
      <div class="xp-label-row">
        <span class="xp-level-badge" id="hdr-level">Level 0</span>
        <span class="xp-next-label" id="hdr-level-next"></span>
      </div>
      <div class="xp-bar-track">
        <div class="xp-bar-fill" id="hdr-xp-bar" style="width:0%"></div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main>

    <!-- Dashboard -->
    <div id="page-dashboard" class="page active">

      <button class="next-month-btn" onclick="advanceDays(1)">
        ⏭ Advance Time
      </button>

      <div class="section-header">
        <span class="section-title">Season</span>
      </div>
      <div class="card" id="dash-season"></div>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-icon"><img src="/static/icons/loan-cash.svg" width="32" height="32" style="image-rendering:pixelated"></div>
          <div class="stat-label">Cash on Hand</div>
          <div class="stat-value green" id="dash-cash">$0</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><img src="/static/icons/stat-networth.svg" width="32" height="32" style="image-rendering:pixelated"></div>
          <div class="stat-label">Net Worth</div>
          <div class="stat-value" id="dash-networth">$0</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><img src="/static/icons/house-ranch.svg" width="32" height="32" style="image-rendering:pixelated"></div>
          <div class="stat-label">Properties</div>
          <div class="stat-value" id="dash-props">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><img src="/static/icons/nav-finances.svg" width="32" height="32" style="image-rendering:pixelated"></div>
          <div class="stat-label">Weekly Income</div>
          <div class="stat-value orange" id="dash-income">$0/wk</div>
        </div>
      </div>

      <div class="section-header" style="margin-top:16px">
        <span class="section-title">💼 Side Jobs</span>
        <span style="font-size:12px;color:var(--text-muted)" id="dash-jobs-energy"></span>
      </div>
      <div id="dash-jobs"></div>

    </div>

    <!-- Market -->
    <div id="page-market" class="page">
      <div class="section-header">
        <span class="section-title">Properties for Sale</span>
      </div>
      <div id="market-list"></div>
    </div>

    <!-- Properties -->
    <div id="page-properties" class="page">
      <div class="section-header">
        <span class="section-title">My Portfolio</span>
      </div>
      <div id="property-list"></div>
    </div>

    <!-- Finances (Bank + Stocks + Taxes) -->
    <div id="page-finances" class="page">
      <div class="fin-subnav">
        <button class="fin-tab active" data-fin="bank"   onclick="switchFinTab('bank')"><img src="/static/icons/loan-bank.svg" width="16" height="16" style="image-rendering:pixelated;vertical-align:middle"> Bank</button>
        <button class="fin-tab"        data-fin="stocks" onclick="switchFinTab('stocks')"><img src="/static/icons/stat-stocks.svg" width="16" height="16" style="image-rendering:pixelated;vertical-align:middle"> Stocks</button>
        <button class="fin-tab"        data-fin="taxes"  onclick="switchFinTab('taxes')">🧾 Taxes</button>
      </div>
      <div id="fin-bank">
        <div id="bank-savings-section"></div>
        <div id="bank-loans-section"></div>
        <div id="bank-products-section"></div>
      </div>
      <div id="fin-stocks" style="display:none">
        <div id="stocks-list"></div>
      </div>
      <div id="fin-taxes" style="display:none"></div>
    </div>

    <!-- Business -->
    <div id="page-business" class="page">
      <div class="section-header"><span class="section-title">💼 Business</span></div>
      <div class="card" style="text-align:center;padding:32px 16px">
        <div style="font-size:40px;margin-bottom:10px">🚧</div>
        <div style="font-weight:800;font-size:16px;margin-bottom:6px">Coming Soon</div>
        <div style="font-size:13px;color:var(--text-muted)">Big things are being built here.</div>
      </div>
    </div>

    <!-- Settings -->
    <div id="page-settings" class="page"></div>

    <!-- Personal -->
    <div id="page-personal" class="page"></div>

  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div id="nav-indicator" class="nav-indicator"></div>
    <button class="nav-btn active" data-page="dashboard">
      <span class="nav-icon"><img src="/static/icons/nav-dashboard.svg" width="24" height="24" style="image-rendering:pixelated"></span>
      Home
    </button>
    <button class="nav-btn" data-page="market">
      <span class="nav-icon"><img src="/static/icons/nav-market.svg" width="24" height="24" style="image-rendering:pixelated"></span>
      Market
    </button>
    <button class="nav-btn" data-page="properties">
      <span class="nav-icon"><img src="/static/icons/nav-properties.svg" width="24" height="24" style="image-rendering:pixelated"></span>
      My Props
    </button>
    <button class="nav-btn" data-page="finances">
      <span class="nav-icon"><img src="/static/icons/nav-finances.svg" width="24" height="24" style="image-rendering:pixelated"></span>
      Finances
    </button>
    <button class="nav-btn" data-page="personal">
      <span class="nav-icon"><img src="/static/icons/home-rental.svg" width="24" height="24" style="image-rendering:pixelated"></span>
      Personal
    </button>
    <button class="nav-btn" data-page="business">
      <span class="nav-icon"><img src="/static/icons/nav-business.svg" width="24" height="24" style="image-rendering:pixelated"></span>
      Business
    </button>
  </nav>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Toasts -->
  <div id="toast-container"></div>

</div>
<script src="/static/game.js"></script>
</body>
</html>
