<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- car body -->
  <rect x="1" y="9"  width="14" height="5" fill="#2196F3"/>
  <!-- roof -->
  <rect x="4" y="6"  width="8"  height="4" fill="#1565C0"/>
  <!-- windows -->
  <rect x="5" y="7"  width="3"  height="2" fill="#B3E5FC"/>
  <rect x="9" y="7"  width="3"  height="2" fill="#B3E5FC"/>
  <!-- wheels -->
  <rect x="2" y="13" width="3"  height="3" fill="#212121"/>
  <rect x="11" y="13" width="3" height="3" fill="#212121"/>
  <rect x="3" y="14" width="1"  height="1" fill="#616161"/>
  <rect x="12" y="14" width="1" height="1" fill="#616161"/>
  <!-- bubbles -->
  <rect x="6"  y="2" width="2" height="2" fill="#B3E5FC" opacity="0.9"/>
  <rect x="10" y="1" width="2" height="2" fill="#B3E5FC" opacity="0.7"/>
  <rect x="3"  y="3" width="1" height="1" fill="#E1F5FE" opacity="0.8"/>
  <rect x="13" y="3" width="1" height="1" fill="#E1F5FE" opacity="0.6"/>
  <!-- water spray lines -->
  <rect x="0"  y="7" width="1"  height="5" fill="#29B6F6" opacity="0.7"/>
  <rect x="15" y="7" width="1"  height="5" fill="#29B6F6" opacity="0.7"/>
</svg>
