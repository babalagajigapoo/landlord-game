<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Face circle -->
  <rect x="3" y="2" width="10" height="12" fill="#E04040"/>
  <rect x="2" y="3" width="12" height="10" fill="#E04040"/>
  <!-- Angry eyebrows (slanted inward) -->
  <rect x="3" y="4" width="4" height="1" fill="#8B0000"/>
  <rect x="3" y="5" width="2" height="1" fill="#8B0000"/>
  <rect x="9" y="4" width="4" height="1" fill="#8B0000"/>
  <rect x="11" y="5" width="2" height="1" fill="#8B0000"/>
  <!-- Eyes -->
  <rect x="4" y="6" width="3" height="2" fill="#8B0000"/>
  <rect x="9" y="6" width="3" height="2" fill="#8B0000"/>
  <!-- Frown mouth -->
  <rect x="4" y="11" width="8" height="1" fill="#8B0000"/>
  <rect x="4" y="10" width="2" height="1" fill="#8B0000"/>
  <rect x="10" y="10" width="2" height="1" fill="#8B0000"/>
  <!-- Cheek flush -->
  <rect x="2" y="7" width="1" height="2" fill="#C03030"/>
  <rect x="13" y="7" width="1" height="2" fill="#C03030"/>
</svg>
