<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Machine body -->
  <rect x="1" y="0" width="14" height="16" fill="#546E7A"/>
  <!-- Outer edge shading -->
  <rect x="0" y="0" width="1" height="16" fill="#37474F"/>
  <rect x="15" y="0" width="1" height="16" fill="#263238"/>
  <!-- Top cap -->
  <rect x="1" y="0" width="14" height="1" fill="#37474F"/>
  <!-- Header label bar -->
  <rect x="2" y="1" width="12" height="2" fill="#455A64"/>
  <rect x="3" y="1" width="10" height="1" fill="#607D8B"/>
  <!-- Glass frame border -->
  <rect x="2" y="3" width="12" height="7" fill="#263238"/>
  <!-- Glass panel -->
  <rect x="3" y="4" width="10" height="5" fill="#81D4FA"/>
  <!-- Glass left shine -->
  <rect x="3" y="4" width="1" height="5" fill="#B3E5FC"/>
  <!-- Products row 1 -->
  <rect x="4" y="4" width="2" height="2" fill="#FF6F00"/>
  <rect x="7" y="4" width="2" height="2" fill="#C62828"/>
  <rect x="10" y="4" width="2" height="2" fill="#2E7D32"/>
  <!-- Products row 2 -->
  <rect x="4" y="7" width="2" height="2" fill="#1565C0"/>
  <rect x="7" y="7" width="2" height="2" fill="#F9A825"/>
  <rect x="10" y="7" width="2" height="2" fill="#6A1B9A"/>
  <!-- Button panel -->
  <rect x="2" y="10" width="12" height="3" fill="#1C313A"/>
  <!-- Coin slot -->
  <rect x="11" y="10" width="3" height="1" fill="#FDD835"/>
  <!-- Selection buttons -->
  <rect x="3" y="11" width="1" height="1" fill="#4CAF50"/>
  <rect x="5" y="11" width="1" height="1" fill="#4CAF50"/>
  <rect x="7" y="11" width="1" height="1" fill="#4CAF50"/>
  <rect x="9" y="11" width="1" height="1" fill="#4CAF50"/>
  <!-- Delivery tray opening -->
  <rect x="2" y="13" width="12" height="2" fill="#263238"/>
  <rect x="3" y="13" width="10" height="1" fill="#0D1B2A"/>
  <!-- Base -->
  <rect x="2" y="15" width="12" height="1" fill="#37474F"/>
</svg>
