<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Brim -->
  <rect x="2" y="11" width="12" height="2" fill="#1B5E20"/>
  <!-- Crown sides -->
  <rect x="5" y="4" width="6" height="8" fill="#2E7D32"/>
  <!-- Crown top -->
  <rect x="6" y="2" width="4" height="3" fill="#2E7D32"/>
  <!-- Hat band -->
  <rect x="5" y="10" width="6" height="1" fill="#1B5E20"/>
  <!-- Ribbon/band detail -->
  <rect x="5" y="9" width="6" height="1" fill="#4CAF50"/>
  <!-- Shine on crown -->
  <rect x="6" y="4" width="1" height="5" fill="#388E3C"/>
  <!-- Top flat -->
  <rect x="6" y="2" width="4" height="1" fill="#388E3C"/>
  <!-- Brim underside shadow -->
  <rect x="2" y="12" width="12" height="1" fill="#0D3B13"/>
</svg>
