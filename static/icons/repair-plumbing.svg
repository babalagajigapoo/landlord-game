<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- handle -->
  <rect x="0" y="7" width="11" height="2" fill="#90A4AE"/>
  <!-- handle end cap -->
  <rect x="0" y="6" width="2" height="4" fill="#607D8B"/>
  <!-- top jaw cap -->
  <rect x="10" y="4" width="5" height="2" fill="#78909C"/>
  <!-- top jaw inner wall -->
  <rect x="10" y="4" width="2" height="4" fill="#78909C"/>
  <!-- bottom jaw cap -->
  <rect x="10" y="10" width="5" height="2" fill="#78909C"/>
  <!-- bottom jaw inner wall -->
  <rect x="10" y="8" width="2" height="4" fill="#78909C"/>
  <!-- outer right wall -->
  <rect x="14" y="4" width="2" height="8" fill="#546E7A"/>
  <!-- shine highlight on handle -->
  <rect x="2" y="7" width="8" height="1" fill="#B0BEC5"/>
</svg>
